@if (authService.isLoggedIn()) {
  <nav class="navbar">
    <div class="nav-brand">JavaCRUD</div>
    <div class="nav-links">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
      @if (authService.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active">User Management</a>
      }
      <a (click)="logout()" routerLink="/login" class="logout">Logout</a>
    </div>
  </nav>
}
<router-outlet />
<app-notification />
